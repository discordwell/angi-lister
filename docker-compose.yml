services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: angi
      POSTGRES_PASSWORD: angi
      POSTGRES_DB: angi_lister
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U angi -d angi_lister"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://angi:angi@db:5432/angi_lister
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://angi:angi@db:5432/angi_lister
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.worker

volumes:
  pgdata:
