<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} — Netic Console</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #222632;
            --border: #2a2e3b;
            --text: #e4e6ed;
            --text-muted: #8b8fa3;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --orange: #f97316;
            --radius: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); text-decoration: underline; }

        /* Top nav */
        .topnav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topnav-brand {
            font-weight: 700;
            font-size: 18px;
            color: var(--text);
            margin-right: 32px;
            letter-spacing: -0.5px;
        }
        .topnav-brand span { color: var(--accent); }
        .topnav-links { display: flex; gap: 4px; }
        .topnav-links a {
            padding: 8px 16px;
            border-radius: var(--radius);
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
        }
        .topnav-links a:hover {
            background: var(--surface-hover);
            color: var(--text);
            text-decoration: none;
        }
        .topnav-links a.active {
            background: var(--accent);
            color: #fff;
        }

        /* Main content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }
        h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        /* Cards / panels */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
        }

        /* Metric tiles */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .metric-tile {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
        }
        .metric-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.2;
        }
        .metric-value.warn { color: var(--yellow); }
        .metric-value.danger { color: var(--red); }
        .metric-value.ok { color: var(--green); }
        .metric-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        thead th {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 2px solid var(--border);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        tbody td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }
        tbody tr:hover { background: var(--surface-hover); }

        /* Status badges */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .badge-mapped { background: rgba(34,197,94,0.15); color: var(--green); }
        .badge-unmapped { background: rgba(234,179,8,0.15); color: var(--yellow); }
        .badge-received { background: rgba(59,130,246,0.15); color: var(--accent); }
        .badge-sent { background: rgba(34,197,94,0.15); color: var(--green); }
        .badge-pending { background: rgba(234,179,8,0.15); color: var(--yellow); }
        .badge-failed { background: rgba(239,68,68,0.15); color: var(--red); }
        .badge-duplicate { background: rgba(249,115,22,0.15); color: var(--orange); }

        /* Forms */
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        textarea { resize: vertical; min-height: 80px; }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn:hover { background: var(--accent-hover); }

        /* Alert boxes */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            font-size: 14px;
        }
        .alert-success { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
        .alert-error { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }

        /* Pre / code blocks for JSON */
        pre {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.5;
        }
        code { font-family: 'SF Mono', Menlo, Consolas, monospace; }

        /* Two-column form grid */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 20px;
        }
        .form-grid .full-width { grid-column: 1 / -1; }

        /* Timeline for events */
        .timeline { list-style: none; padding-left: 0; }
        .timeline li {
            position: relative;
            padding: 8px 0 8px 24px;
            border-left: 2px solid var(--border);
            margin-left: 8px;
        }
        .timeline li::before {
            content: '';
            position: absolute;
            left: -5px;
            top: 14px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
        }
        .timeline-type {
            font-weight: 600;
            font-size: 13px;
        }
        .timeline-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Score bar */
        .score-bar {
            display: inline-block;
            width: 60px;
            height: 8px;
            background: var(--bg);
            border-radius: 4px;
            overflow: hidden;
            vertical-align: middle;
            margin-right: 6px;
        }
        .score-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .metrics-grid { grid-template-columns: repeat(2, 1fr); }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>
    <nav class="topnav">
        <div class="topnav-brand"><span>Netic</span> Console</div>
        <div class="topnav-links">
            <a href="/console/" class="{% if page_title == 'Dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/console/duplicates" class="{% if page_title == 'Duplicate Leads' %}active{% endif %}">Duplicates</a>
            <a href="/console/simulate" class="{% if page_title == 'Simulate Lead' %}active{% endif %}">Simulate</a>
        </div>
        <div style="margin-left:auto; display:flex; align-items:center; gap:12px;">
            {% if session and session.email %}
            <span style="font-size:13px; color:var(--text-muted);">{{ session.email }}</span>
            {% endif %}
            <a href="/auth/logout" style="font-size:13px; color:var(--text-muted); padding:6px 12px; border:1px solid var(--border); border-radius:var(--radius);">Sign out</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
