<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to Netic Console</title>
</head>
<body style="margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background-color:#0f1117; color:#e4e6ed;">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="padding:40px 0;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" role="presentation" style="background:#1a1d27; border-radius:12px; overflow:hidden; border:1px solid #2a2e3b;">
          <tr>
            <td style="padding:32px 32px 24px; text-align:center;">
              <h1 style="font-size:22px; font-weight:700; margin:0; color:#e4e6ed;">
                <span style="color:#3b82f6;">Netic</span> Console
              </h1>
            </td>
          </tr>
          <tr>
            <td style="height:3px; background:linear-gradient(90deg, #3b82f6, #2563eb);"></td>
          </tr>
          <tr>
            <td style="padding:28px 32px; font-size:15px; line-height:1.6; color:#e4e6ed;">
              <p style="margin:0 0 16px;">Click the button below to sign in to the {{ tenant_name }} console.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 28px; text-align:center;">
              <a href="{{ magic_link }}" style="display:inline-block; padding:14px 32px; background:#3b82f6; color:#ffffff; border-radius:8px; text-decoration:none; font-weight:600; font-size:15px;">
                Sign in to Console
              </a>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 24px; font-size:13px; color:#8b8fa3; line-height:1.5;">
              <p style="margin:0 0 8px;">Or copy and paste this link:</p>
              <p style="margin:0; word-break:break-all; color:#3b82f6;">{{ magic_link }}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px; background:#15171f; border-top:1px solid #2a2e3b; text-align:center; font-size:12px; color:#8b8fa3;">
              This link expires in 15 minutes and can only be used once.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
