<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Netic Console</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2e3b;
            --text: #e4e6ed;
            --text-muted: #8b8fa3;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --green: #22c55e;
            --red: #ef4444;
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 24px;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 32px;
        }
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .brand h1 span { color: var(--accent); }
        .brand p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        input[type="email"] {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            font-family: inherit;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-demo {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--border);
            margin-top: 8px;
        }
        .btn-demo:hover {
            background: var(--surface);
            border-color: var(--accent);
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .divider::before { margin-right: 12px; }
        .divider::after { margin-left: 12px; }
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            font-size: 14px;
        }
        .alert-success { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
        .alert-error { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <h1><span>Netic</span> Console</h1>
                <p>Angi Lead Management</p>
            </div>

            {% if success %}
            <div class="alert alert-success">{{ success }}</div>
            {% endif %}

            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/auth/send-link">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" required
                           placeholder="you@company.com" autofocus>
                </div>
                <button type="submit" class="btn btn-primary">Send sign-in link</button>
            </form>

            {% if demo_tenant %}
            <div class="divider">or</div>
            <form method="POST" action="/auth/demo-login">
                <button type="submit" class="btn btn-demo">
                    Demo as {{ demo_tenant.name }}
                </button>
            </form>
            {% endif %}
        </div>
        <p class="footer-note">
            We'll email you a magic link to sign in — no password needed.
        </p>
    </div>
</body>
</html>
